<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQA Manager SRK - Iniciar Sesion</title>
    <style>
        /* Estilos generales de la pagina de login */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Contenedor principal del formulario */
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        /* Logo y titulo */
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #0f3460;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        /* Campos del formulario */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0f3460;
        }

        /* Boton de login */
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background: #16213e;
        }

        /* Mensajes de error y exito */
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="login-container">

    <!-- Encabezado con logo del sistema -->
    <div class="login-header">
        <h1>⛏️ CQA Manager SRK</h1>
        <p>Sistema de Control de Calidad en Mineria</p>
    </div>

    <!-- Mensaje de error si las credenciales son incorrectas -->
    <div class="alert-error" th:if="${error}" th:text="${error}"></div>

    <!-- Mensaje de exito al cerrar sesion -->
    <div class="alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>

    <!--
        Formulario de login.
        action="/auth/login" - URL que procesa Spring Security
        method="post"       - Metodo POST para enviar credenciales
    -->
    <form th:action="@{/auth/login}" method="post">

        <!-- Campo email - equivalente al input del login.jsp anterior -->
        <div class="form-group">
            <label for="email">Correo Electronico</label>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="usuario@srk.com"
                   required/>
        </div>

        <!-- Campo password -->
        <div class="form-group">
            <label for="password">Contrasena</label>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="••••••••"
                   required/>
        </div>

        <!-- Boton de envio del formulario -->
        <button type="submit" class="btn-login">
            Iniciar Sesion
        </button>

    </form>

    <div class="footer-text">
        <p>SRK Consulting &copy; 2024 | Fabian Cuevas</p>
    </div>

</div>

</body>
</html>
