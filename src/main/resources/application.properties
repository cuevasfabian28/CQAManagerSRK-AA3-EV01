server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/cqa_manager_srk?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=administrador
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

spring.mvc.hiddenmethod.filter.enabled=true
spring.main.allow-circular-references=true

logging.level.com.srk.cqa=DEBUG
logging.level.org.springframework.security=DEBUG